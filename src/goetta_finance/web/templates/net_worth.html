{% extends "base.html" %}
{% block title %}Net worth — goetta-finance{% endblock %}
{% block content %}
  <h2>Net worth</h2>
  <form method="get" class="chart-controls">
    <label>Lookback (days):
      <input type="number" name="days" value="{{ days }}" min="7" max="3650">
    </label>
    <button type="submit">Update</button>
  </form>
  <div id="net-worth-chart" class="chart"></div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      Plotly.newPlot(
        "net-worth-chart",
        {{ figure_data | safe }},
        {{ figure_layout | safe }},
        { responsive: true, displaylogo: false }
      );
    });
  </script>
{% endblock %}
