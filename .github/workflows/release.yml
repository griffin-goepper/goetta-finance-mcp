# Publish to PyPI via Trusted Publishing (OIDC) — no API token stored anywhere.
#
# Trigger: publishing a GitHub Release. To cut a release:
#   1. Bump `version` in pyproject.toml and merge it.
#   2. Create a GitHub Release with tag `vX.Y.Z` (matching the version).
# Publishing then runs automatically.
#
# One-time setup before the first release (see CONTRIBUTING / the PR that
# added this file):
#   - On PyPI: add a "pending" Trusted Publisher for project `goetta-finance`
#     pointing at owner `griffin-goepper`, repo `goetta-finance-mcp`,
#     workflow `release.yml`, environment `pypi`.
#   - On GitHub: create an Environment named `pypi` (optionally require your
#     own review before deploys).

name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel ships data files
        # Guards the packaging contract: migrations + bundled web assets must
        # be inside the wheel, or a fresh `pip install` is broken at runtime.
        run: |
          python -m zipfile -l dist/*.whl > wheel_contents.txt
          for f in store/migrations/0001_init.sql web/templates/base.html web/static/styles.css; do
            grep -q "$f" wheel_contents.txt || { echo "wheel is missing data file: $f"; exit 1; }
          done
          echo "wheel data files present"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/goetta-finance
    permissions:
      id-token: write # OIDC token for Trusted Publishing; no password/API token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
